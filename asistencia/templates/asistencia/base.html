{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDM Asistencia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'inicio' %}">
            🎾 TDM Coach
        </a>

        <div class="d-flex gap-3">
            <a class="nav-link text-white" href="{% url 'inicio' %}">Inicio</a>
            <a class="nav-link text-white" href="{% url 'lista_jugadores' %}">Jugadores</a>
            <a class="nav-link text-white" href="{% url 'cargar_ejercicios' %}">Ejercicios</a>
            <a class="nav-link text-white" href="{% url 'seguimiento_semanal' %}">Seguimiento</a>
            <a class="nav-link text-white" href="{% url 'reportes' %}">Reportes</a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info d-none mensaje-django" data-message="{{ message|escape }}"></div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}
</div>

<div id="toast-guardado" class="toast-guardado"></div>

<script>
function mostrarToastGuardado(texto = "Guardado correctamente") {
    const toast = document.getElementById("toast-guardado");
    if (!toast) return;

    toast.textContent = texto;
    toast.classList.add("mostrar");

    clearTimeout(window.toastTimeout);
    window.toastTimeout = setTimeout(() => {
        toast.classList.remove("mostrar");
    }, 1800);
}

document.addEventListener("DOMContentLoaded", function() {
    const mensaje = document.querySelector(".mensaje-django");
    if (mensaje) {
        const texto = mensaje.dataset.message || "Guardado correctamente";
        mostrarToastGuardado(texto);
    }
});

document.addEventListener("click", async function(e) {
    const btn = e.target.closest(".attendance-btn");
    if (!btn) return;

    const attendanceId = btn.dataset.attendanceId;
    const status = btn.dataset.status;
    const csrfTokenInput = document.querySelector('[name=csrfmiddlewaretoken]');
    if (!csrfTokenInput) return;

    const csrfToken = csrfTokenInput.value;

    const response = await fetch(`/asistencia/${attendanceId}/estado/`, {
        method: "POST",
        headers: {
            "X-CSRFToken": csrfToken,
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({ estado: status })
    });

    const data = await response.json();

    if (data.ok) {
        const row = btn.closest(".attendance-row");
        row.querySelectorAll(".attendance-btn").forEach(b => {
            b.classList.remove("active-asistio", "active-ausente", "active-tarde");
        });

        if (data.estado !== "pendiente") {
            btn.classList.add(`active-${data.estado}`);
            mostrarToastGuardado("Asistencia guardada");
        } else {
            mostrarToastGuardado("Asistencia desmarcada");
        }
    } else {
        alert("No se pudo guardar el estado.");
    }
});
</script>

</body>
</html>
